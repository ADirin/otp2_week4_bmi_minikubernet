apiVersion: v1
kind: Service
metadata:
  name: gui-app-service
spec:
  type: NodePort
  selector:
    app: gui-app
  ports:
    - protocol: TCP
      port: 8080         # service port inside cluster
      targetPort: 8080   # container port
      nodePort: 30080    # node port exposed by Minikube (choose 30000-32767)
