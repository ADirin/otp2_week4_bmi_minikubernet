apiVersion: v1
kind: Service
metadata:
  name: gui-app-service
spec:
  type: NodePort
  selector:
    app: gui-app
  ports:
    - protocol: TCP
      port: 8080         # The internal port your GUI app listens on
      targetPort: 8080   # The containerPort from your Deployment
      nodePort: 30080    # External Minikube port (optional, must be between 30000–32767)
