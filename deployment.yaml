apiVersion: apps/v1
kind: Deployment
metadata:
  name: gui-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gui-app
  template:
    metadata:
      labels:
        app: gui-app
    spec:
      containers:
        - name: gui-app
          image: amirdirin/sep2_week3_2025_bmidemo
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "host.docker.internal"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "Test12"
            - name: DB_NAME
              value: "bmi_localization"
